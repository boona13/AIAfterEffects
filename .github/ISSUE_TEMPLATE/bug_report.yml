name: Bug report
description: Report a bug, regression, crash, or broken workflow
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please remember this project is still pre-release and unstable, so detailed repro steps help a lot.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem clearly.
      placeholder: The app crashed when I exported a scene with a 3D model...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Create a scene with...
        3. Click...
        4. Observe...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Generation / agent loop
        - Timeline / animation
        - 3D / model rendering
        - Export
        - Project save/load
        - Settings / integrations
        - UI / UX
        - Other
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: macOS version, Xcode version if relevant, and app branch/commit if known

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or recordings
      description: Paste non-sensitive logs only. Never paste API keys or tokens.
