name: Feature request
description: Suggest a new capability or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. The project is still evolving quickly, so requests that improve stability, animation quality, and contributor ergonomics are especially helpful.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: It is hard to...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: I would like the app to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: impact
    attributes:
      label: Impact area
      options:
        - Stability / reliability
        - Generation quality
        - 3D / rendering
        - Export
        - UX
        - Integrations
        - Contributor experience
        - Documentation
